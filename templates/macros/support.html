{% macro block(placement="post") %}
    {%- if config.extra.support_github_sponsors_url %}
        <aside class="support-box support-box--{{ placement }}" aria-label="Support this blog">
            <blockquote class="support-box__quote">
                <p>
                    If my writing helped you, you can support it via
                    <a class="support-link support-link--github" href="{{ config.extra.support_github_sponsors_url | safe }}" target="_blank" rel="noopener noreferrer" data-no-pjax>[GitHub Sponsors]</a>.
                    It helps me keep writing about Rust, backend, and gamedev.
                </p>
            </blockquote>
        </aside>
    {% endif -%}
{% endmacro block %}
