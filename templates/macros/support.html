{% macro block(placement="post") %}
    {%- if config.extra.support_github_sponsors_url %}
        <aside class="support-box support-box--{{ placement }}" aria-label="Support this blog">
            <div class="support-box__copy">
                <p>If my writing helped you, sponsoring keeps these Rust, backend, and gamedev notes coming.</p>
            </div>
            <a class="support-link support-link--github" href="{{ config.extra.support_github_sponsors_url | safe }}" target="_blank" rel="noopener noreferrer" data-no-pjax>Sponsor on GitHub</a>
        </aside>
    {% endif -%}
{% endmacro block %}
